<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://uitgavenbeheer.netlify.app/?v=5">
  <title>VisaTracker 2.0</title>
  <style>
    :root { color-scheme: light; --navy:#1A1F71; --gold:#F7B731; --cream:#FAF7F2; --ink:#1A1714; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family: Arial, sans-serif; background:var(--cream); color:var(--ink); padding:24px; }
    main { max-width:520px; width:100%; text-align:center; background:white; border:1px solid #E2DACE; border-radius:16px; padding:32px 24px; box-shadow:0 16px 40px rgba(26,23,20,.08); }
    .chip { display:inline-block; background:var(--navy); color:white; border-radius:8px; padding:6px 12px; font-weight:700; letter-spacing:.04em; }
    h1 { color:var(--navy); margin:18px 0 8px; }
    p { line-height:1.5; color:#5f584f; }
    a { display:inline-block; margin-top:16px; background:var(--gold); color:var(--navy); font-weight:700; padding:12px 18px; border-radius:10px; text-decoration:none; }
  </style>
</head>
<body>
  <main>
    <span class="chip">VisaTracker 2.0</span>
    <h1>De app wordt geopend</h1>
    <p>Je wordt doorgestuurd naar de live v5-versie met automatische randdetectie, bolletjes op de hoeken, crop en rechtzetten.</p>
    <a href="https://uitgavenbeheer.netlify.app/?v=5">Open VisaTracker</a>
  </main>
</body>
</html>
