:root{--navy:#1A1F71;--gold:#F7B731;--cream:#FAF7F2;--ink:#1A1714;--muted:#746e66;--border:#E2DACE;--danger:#C0392B;--ok:#1A7A40}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--cream);color:var(--ink);font-family:Arial,sans-serif}.screen{display:none;min-height:100vh;flex-direction:column}.screen.active{display:flex}.header{background:var(--navy);color:#fff;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:10px;align-items:center}.chip{background:#fff;color:var(--navy);font-weight:800;font-style:italic;border-radius:7px;padding:5px 11px}.chip span{color:var(--gold)}h1{font-size:16px;margin:0}.sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}.header button,.primary{background:var(--gold);color:var(--navy);border:0;border-radius:10px;font-weight:800;padding:10px 14px}.content{padding:16px;padding-bottom:90px;overflow:auto}.hero{width:100%;border:0;background:var(--navy);color:#fff;border-radius:20px;padding:30px 18px;text-align:center;margin-bottom:14px}.hero strong{display:block;font-size:21px;margin-bottom:6px}.hero small{color:rgba(255,255,255,.72)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}.tile{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px 12px;text-align:center;font-weight:700}.section{display:flex;justify-content:space-between;align-items:center;margin:10px 0 12px}.pill{background:var(--navy);color:#fff;border-radius:999px;padding:6px 12px;font-size:13px}.expense{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}.row{display:flex}.thumb{width:84px;min-height:84px;background:#eee;display:grid;place-items:center;border-right:1px solid var(--border);overflow:hidden}.thumb img{width:84px;height:84px;object-fit:cover}.body{padding:12px;flex:1;min-width:0}.topline{display:flex;justify-content:space-between;gap:8px}.desc{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.amount{font-weight:800;color:var(--navy);white-space:nowrap}.meta,.cat,.note{font-size:12px;color:var(--muted);margin-top:5px}.cat{display:inline-block;background:var(--cream);border-radius:6px;padding:3px 7px;text-transform:uppercase}.card-actions{display:flex;border-top:1px solid var(--border)}.card-actions button{flex:1;border:0;background:#fff;padding:10px;color:var(--muted);font-weight:700}.card-actions button+button{border-left:1px solid var(--border)}.empty{text-align:center;color:var(--muted);padding:50px 20px}.scanner{position:fixed;inset:0;background:#000;z-index:20}.scan-head,.scan-bar{position:absolute;left:0;right:0;z-index:3;display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;color:#fff;background:linear-gradient(to bottom,rgba(0,0,0,.78),transparent)}.scan-bar{top:auto;bottom:0;padding:16px 24px calc(env(safe-area-inset-bottom,0px) + 16px);background:linear-gradient(to top,rgba(0,0,0,.85),transparent)}video{width:100%;height:100%;object-fit:cover}.close{border:0;border-radius:50%;width:38px;height:38px;background:rgba(255,255,255,.22);color:#fff;font-size:20px}.shutter{width:78px;height:78px;border-radius:50%;border:4px solid #fff;background:rgba(255,255,255,.14);display:grid;place-items:center}.shutter:after{content:"";width:56px;height:56px;border-radius:50%;background:#fff}.done{background:var(--gold);color:var(--navy);border:0;border-radius:22px;padding:12px 18px;font-weight:800;visibility:hidden}.frame{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);width:78%;max-width:340px;aspect-ratio:3/4;border:2px dashed rgba(255,255,255,.75);border-radius:14px;z-index:2;pointer-events:none}.strip{position:absolute;left:0;right:0;bottom:112px;display:flex;gap:8px;overflow:auto;padding:0 16px;z-index:3}.mini{position:relative;flex:0 0 auto}.mini img{width:50px;height:68px;object-fit:cover;border:2px solid #fff;border-radius:8px}.mini button{position:absolute;right:-6px;top:-6px;border:0;background:var(--danger);color:#fff;border-radius:50%;width:20px;height:20px}.review{position:fixed;inset:0;background:#111;z-index:30}.review-head{background:var(--navy);color:#fff;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;display:flex;justify-content:space-between;align-items:center}.review-head button{background:transparent;border:0;color:var(--gold);font-weight:800}.canvas-wrap{flex:1;display:grid;place-items:center;position:relative;padding:12px;overflow:hidden}#cropCanvas{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.55)}#cropSvg{position:absolute;overflow:visible;pointer-events:none}.handle{filter:drop-shadow(0 2px 4px #000)}.tools{background:var(--navy);padding:12px 12px calc(env(safe-area-inset-bottom,0px) + 12px);display:flex;gap:8px}.tools button{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:#fff;border-radius:10px;padding:12px 10px;font-weight:800}.tools .accept{background:var(--gold);color:var(--navy);border:0;flex:2}.sheet{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;display:none;align-items:flex-end}.sheet.open{display:flex}.panel{background:var(--cream);width:100%;max-height:92vh;overflow:auto;border-radius:22px 22px 0 0;padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 18px)}.handlebar{width:42px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}.preview{width:100%;max-height:210px;object-fit:contain;background:#111;border-radius:10px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;display:block;margin:0 0 6px}input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px;background:#fff;font:inherit}textarea{min-height:70px}.field{margin-bottom:14px}.euro{position:relative}.euro span{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-weight:800;color:var(--muted)}.euro input{padding-left:28px}.add{width:100%;border:0;background:var(--navy);color:#fff;border-radius:12px;padding:15px;font-weight:800;font-size:16px}.toast{position:fixed;left:16px;right:16px;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);background:var(--ink);color:#fff;text-align:center;border-radius:12px;padding:14px;z-index:99;opacity:0;transform:translateY(80px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}@media(min-width:720px){body{display:grid;place-items:center;padding:24px}.screen.active{max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.12);border-radius:24px;overflow:hidden}.scanner,.review{max-width:440px;margin:auto;left:50%;transform:translateX(-50%)}.panel{max-width:440px;margin:auto}}

<body>
<div class="screen active" id="home"><div class="header"><div class="brand"><div class="chip"><span>V</span>ISA</div><div><h1>VisaTracker</h1><div class="sub">Expense scanner</div></div></div><button onclick="exportPDF()">PDF</button></div><div class="content"><button class="hero" onclick="openScanner()"><strong>Document scannen</strong><small>Maak een foto, controleer de randen en bevestig</small></button><div class="actions"><button class="tile" onclick="photoInput.click()">Foto uploaden</button><button class="tile" onclick="pdfInput.click()">PDF uploaden</button></div><input id="photoInput" type="file" accept="image/*" hidden onchange="handleFileUpload(event)"><input id="pdfInput" type="file" accept="application/pdf" hidden onchange="handleFileUpload(event)"><div class="section"><strong>Uitgaven</strong><span class="pill">Totaal: <b id="total">EUR 0.00</b></span></div><div id="list" class="empty">Nog geen uitgaven</div></div></div>
<div class="screen scanner" id="scanner"><div class="scan-head"><b>Document scannen</b><button class="close" onclick="closeScanner()">×</button></div><video id="video" autoplay playsinline muted></video><div class="frame"></div><div class="strip" id="strip"></div><div class="scan-bar"><span><b id="count">0</b> foto&apos;s</span><button class="shutter" onclick="captureFrame()"></button><button class="done" id="done" onclick="finishScanning()">Klaar</button></div></div>
<div class="screen review" id="review"><div class="review-head"><button onclick="backToScanner()">← Terug</button><b>Randen controleren</b><span style="width:54px"></span></div><div class="canvas-wrap" id="wrap"><canvas id="cropCanvas"></canvas><svg id="cropSvg"><polygon id="poly" fill="rgba(247,183,49,.14)" stroke="#F7B731" stroke-width="2"></polygon><circle id="h0" class="handle" r="16" fill="white" stroke="#1A1F71" stroke-width="2.5"></circle><circle id="h1" class="handle" r="16" fill="white" stroke="#1A1F71" stroke-width="2.5"></circle><circle id="h2" class="handle" r="16" fill="white" stroke="#1A1F71" stroke-width="2.5"></circle><circle id="h3" class="handle" r="16" fill="white" stroke="#1A1F71" stroke-width="2.5"></circle></svg></div><div class="tools"><button onclick="rotateImg()">Draaien</button><button onclick="setFilter('bw')">Z/W</button><button onclick="setFilter('enhance')">Scherp</button><button class="accept" onclick="acceptReview()">Bevestigen</button></div></div>
<div class="sheet" id="sheet"><div class="panel"><div class="handlebar"></div><h2>Nieuwe uitgave</h2><img id="preview" class="preview" hidden><div class="grid"><div class="field"><label>Datum</label><input id="date" type="date"></div><div class="field"><label>Bedrag</label><div class="euro"><span>€</span><input id="amount" type="number" step="0.01" inputmode="decimal"></div></div></div><div class="field"><label>Beschrijving</label><input id="desc" placeholder="bv. parking, supermarkt"></div><div class="field"><label>Categorie</label><select id="cat"></select></div><div class="field"><label>Notities</label><textarea id="notes"></textarea></div><button class="add" onclick="addExpense()">Toevoegen</button></div></div><div class="toast" id="toast"></div><canvas id="process" hidden></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const cats=['Parking','Brandstof','Tol','Openbaar vervoer','Taxi','Huurwagen','Boodschappen','Restaurant','Koffie','Hotel','Reizen','Vlucht/Trein','Kantoor','Software','Diensten','Abonnementen','Telecom','Verzekering','Belastingen','Gezondheid','Onderhoud','Cadeaus','Vrije tijd','Aankopen','Overige'];let expenses=[],pages=[],stream=null,currentImage=null,editIndex=-1,reviewImg=null,reviewRot=0,reviewFilter='none',cropQuad=null,drag=-1;cat.innerHTML=cats.map(c=>`<option>${c}</option>`).join('');date.valueAsDate=new Date();render();
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}function toast(m){toastEl=toast;toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(toastEl.t);toastEl.t=setTimeout(()=>toastEl.classList.remove('show'),2400)}
async function openScanner(){pages=[];renderThumbs();show('scanner');try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});video.srcObject=stream}catch{toast('Camera niet beschikbaar');show('home')}}function closeScanner(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}show('home')}function captureFrame(){const c=process;c.width=video.videoWidth||1280;c.height=video.videoHeight||720;c.getContext('2d').drawImage(video,0,0,c.width,c.height);pages.push(c.toDataURL('image/jpeg',.93));renderThumbs();openReview(pages.length-1)}function renderThumbs(){count.textContent=pages.length;done.style.visibility=pages.length?'visible':'hidden';strip.innerHTML=pages.map((p,i)=>`<div class="mini"><img src="${p}" onclick="openReview(${i})"><button onclick="event.stopPropagation();pages.splice(${i},1);renderThumbs()">×</button></div>`).join('')}function backToScanner(){show('scanner')}
function openReview(i){editIndex=i;reviewRot=0;reviewFilter='none';const img=new Image();img.onload=()=>{reviewImg=img;show('review');requestAnimationFrame(()=>{drawReview();autoCorners();attachDrag();toast('Randen gevonden - pas bolletjes aan of bevestig')})};img.src=pages[i]}function drawReview(){const c=cropCanvas,ctx=c.getContext('2d'),img=reviewImg;let w=img.width,h=img.height;if(reviewRot%180)[w,h]=[h,w];c.width=w;c.height=h;ctx.save();ctx.translate(w/2,h/2);ctx.rotate(reviewRot*Math.PI/180);ctx.drawImage(img,-img.width/2,-img.height/2);ctx.restore();if(reviewFilter!=='none'){const d=ctx.getImageData(0,0,w,h),p=d.data;for(let i=0;i<p.length;i+=4){if(reviewFilter==='bw'){const g=.299*p[i]+.587*p[i+1]+.114*p[i+2];p[i]=p[i+1]=p[i+2]=g}else{for(let k=0;k<3;k++)p[i+k]=Math.min(255,Math.max(0,1.55*(p[i+k]-128)+145))}}ctx.putImageData(d,0,0)}}function autoCorners(){const c=cropCanvas,d=c.getContext('2d').getImageData(0,0,c.width,c.height).data;cropQuad=detectDocument(c.width,c.height,d).quad;renderOverlay()}function rotateImg(){reviewRot=(reviewRot+90)%360;drawReview();autoCorners()}function setFilter(f){reviewFilter=f;drawReview();autoCorners()}
function detectDocument(W,H,data){return detectEdges(W,H,data)||detectBright(W,H,data)||defaultDoc(W,H)}function detectEdges(W,H,data){const scale=Math.min(1,720/Math.max(W,H)),w=Math.round(W*scale),h=Math.round(H*scale),gray=new Uint8ClampedArray(w*h);for(let y=0;y<h;y++){const sy=Math.min(H-1,Math.round(y/scale));for(let x=0;x<w;x++){const sx=Math.min(W-1,Math.round(x/scale)),i=(sy*W+sx)*4;gray[y*w+x]=.299*data[i]+.587*data[i+1]+.114*data[i+2]}}const mags=[],edge=new Uint8Array(w*h);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const p=y*w+x,gx=-gray[p-w-1]+gray[p-w+1]-2*gray[p-1]+2*gray[p+1]-gray[p+w-1]+gray[p+w+1],gy=-gray[p-w-1]-2*gray[p-w]-gray[p-w+1]+gray[p+w-1]+2*gray[p+w]+gray[p+w+1];mags.push(Math.hypot(gx,gy))}mags.sort((a,b)=>a-b);const th=Math.max(38,mags[Math.floor(mags.length*.84)]||0);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const p=y*w+x,gx=-gray[p-w-1]+gray[p-w+1]-2*gray[p-1]+2*gray[p+1]-gray[p+w-1]+gray[p+w+1],gy=-gray[p-w-1]-2*gray[p-w]-gray[p-w+1]+gray[p+w-1]+2*gray[p+w]+gray[p+w+1];if(Math.hypot(gx,gy)>=th)for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)edge[p+dy*w+dx]=1}const seen=new Uint8Array(w*h),q=[];let best=null;for(let y=2;y<h-2;y++)for(let x=2;x<w-2;x++){const s=y*w+x;if(!edge[s]||seen[s])continue;let count=0,minX=x,minY=y,maxX=x,maxY=y;q.length=0;q.push(s);seen[s]=1;for(let qi=0;qi<q.length;qi++){const p=q[qi],px=p%w,py=p/w|0;count++;minX=Math.min(minX,px);minY=Math.min(minY,py);maxX=Math.max(maxX,px);maxY=Math.max(maxY,py);for(const n of [p-1,p+1,p-w,p+w,p-w-1,p-w+1,p+w-1,p+w+1])if(n>0&&n<edge.length&&edge[n]&&!seen[n]){seen[n]=1;q.push(n)}}const area=(maxX-minX)*(maxY-minY),border=minX<4||minY<4||maxX>w-5||maxY>h-5;if(!border&&count>70&&area>w*h*.08&&(!best||area>best.area))best={minX,minY,maxX,maxY,area}}if(!best)return null;const pts=[];for(let y=best.minY;y<=best.maxY;y++)for(let x=best.minX;x<=best.maxX;x++)if(edge[y*w+x])pts.push([x/scale,y/scale]);return pointsDoc(W,H,pts,Math.min(W,H)*.014)}function detectBright(W,H,data){const step=Math.max(2,Math.floor(Math.min(W,H)/420)),hits=[];for(let y=0;y<H;y+=step)for(let x=0;x<W;x+=step){const i=(y*W+x)*4,l=.299*data[i]+.587*data[i+1]+.114*data[i+2],sat=Math.max(data[i],data[i+1],data[i+2])-Math.min(data[i],data[i+1],data[i+2]);if(l>165&&(sat<95||l>215))hits.push([x,y])}return pointsDoc(W,H,hits,Math.min(W,H)*.018)}function pointsDoc(W,H,pts,pad){if(pts.length<40)return null;let minX=W,minY=H,maxX=0,maxY=0,tl,tr,br,bl,tls=1e9,trs=-1e9,brs=-1e9,bls=1e9;pts.forEach(([x,y])=>{minX=Math.min(minX,x);minY=Math.min(minY,y);maxX=Math.max(maxX,x);maxY=Math.max(maxY,y);const s=x+y,d=x-y;if(s<tls){tls=s;tl={x,y}}if(d>trs){trs=d;tr={x,y}}if(s>brs){brs=s;br={x,y}}if(d<bls){bls=d;bl={x,y}}});let q=[tl,tr,br,bl].map(p=>({x:Math.max(0,Math.min(W,p.x)),y:Math.max(0,Math.min(H,p.y))}));if(!validQuad(W,H,q))q=rectQuad({x:minX,y:minY,w:maxX-minX,h:maxY-minY});return {quad:q}}function defaultDoc(W,H){const p=Math.min(W,H)*.04;return{quad:rectQuad({x:p,y:p,w:W-2*p,h:H-2*p})}}function rectQuad(r){return[{x:r.x,y:r.y},{x:r.x+r.w,y:r.y},{x:r.x+r.w,y:r.y+r.h},{x:r.x,y:r.y+r.h}]}function validQuad(W,H,q){const a=Math.abs(area(q));return a>W*H*.16&&Math.min(dist(q[0],q[1]),dist(q[1],q[2]),dist(q[2],q[3]),dist(q[3],q[0]))>Math.min(W,H)*.1}function area(q){return q.reduce((s,p,i)=>{const n=q[(i+1)%4];return s+p.x*n.y-n.x*p.y},0)/2}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function renderOverlay(){const c=cropCanvas,r=c.getBoundingClientRect(),wr=wrap.getBoundingClientRect();cropSvg.style.left=r.left-wr.left+'px';cropSvg.style.top=r.top-wr.top+'px';cropSvg.style.width=r.width+'px';cropSvg.style.height=r.height+'px';cropSvg.setAttribute('viewBox',`0 0 ${r.width} ${r.height}`);const pts=cropQuad.map(p=>[p.x*r.width/c.width,p.y*r.height/c.height]);poly.setAttribute('points',pts.map(p=>p.join(',')).join(' '));pts.forEach(([x,y],i)=>{const h=document.getElementById('h'+i);h.setAttribute('cx',x);h.setAttribute('cy',y);h.style.pointerEvents='all'})}function attachDrag(){cropSvg.style.pointerEvents='all';for(let i=0;i<4;i++){const h=document.getElementById('h'+i);h.onmousedown=h.ontouchstart=e=>{e.preventDefault();drag=i}}const move=e=>{if(drag<0)return;e.preventDefault();const t=e.touches?e.touches[0]:e,r=cropCanvas.getBoundingClientRect();cropQuad[drag]={x:Math.max(0,Math.min(cropCanvas.width,(t.clientX-r.left)*cropCanvas.width/r.width)),y:Math.max(0,Math.min(cropCanvas.height,(t.clientY-r.top)*cropCanvas.height/r.height))};renderOverlay()};cropSvg.onmousemove=move;cropSvg.ontouchmove=move;cropSvg.onmouseup=cropSvg.ontouchend=()=>drag=-1;document.onmouseup=()=>drag=-1}
function acceptReview(){pages[editIndex]=warp(cropCanvas,cropQuad,.93);renderThumbs();show('scanner')}function warp(src,q,quality){const W=Math.round(Math.max(dist(q[0],q[1]),dist(q[2],q[3]))),H=Math.round(Math.max(dist(q[1],q[2]),dist(q[3],q[0]))),scale=Math.min(1,1800/Math.max(W,H)),w=Math.max(1,Math.round(W*scale)),h=Math.max(1,Math.round(H*scale)),dst=document.createElement('canvas');dst.width=w;dst.height=h;const sctx=src.getContext('2d'),sd=sctx.getImageData(0,0,src.width,src.height),dctx=dst.getContext('2d'),od=dctx.createImageData(w,h),m=perspective([{x:0,y:0},{x:w-1,y:0},{x:w-1,y:h-1},{x:0,y:h-1}],q);for(let y=0;y<h;y++)for(let x=0;x<w;x++){const den=m[6]*x+m[7]*y+1,sx=(m[0]*x+m[1]*y+m[2])/den,sy=(m[3]*x+m[4]*y+m[5])/den,co=sample(sd,sx,sy),di=(y*w+x)*4;od.data[di]=co[0];od.data[di+1]=co[1];od.data[di+2]=co[2];od.data[di+3]=255}dctx.putImageData(od,0,0);return dst.toDataURL('image/jpeg',quality)}function sample(img,x,y){const W=img.width,H=img.height;x=Math.max(0,Math.min(W-1,x));y=Math.max(0,Math.min(H-1,y));const x0=Math.floor(x),y0=Math.floor(y),x1=Math.min(W-1,x0+1),y1=Math.min(H-1,y0+1),dx=x-x0,dy=y-y0,out=[0,0,0];for(let c=0;c<3;c++){const p=(ix,iy)=>img.data[(iy*W+ix)*4+c],top=p(x0,y0)*(1-dx)+p(x1,y0)*dx,bot=p(x0,y1)*(1-dx)+p(x1,y1)*dx;out[c]=top*(1-dy)+bot*dy}return out}function perspective(from,to){const A=[],b=[];for(let i=0;i<4;i++){const x=from[i].x,y=from[i].y,u=to[i].x,v=to[i].y;A.push([x,y,1,0,0,0,-u*x,-u*y]);b.push(u);A.push([0,0,0,x,y,1,-v*x,-v*y]);b.push(v)}return solve(A,b)||[1,0,0,0,1,0,0,0]}function solve(A,b){const n=b.length,M=A.map((r,i)=>r.concat(b[i]));for(let c=0;c<n;c++){let p=c;for(let r=c+1;r<n;r++)if(Math.abs(M[r][c])>Math.abs(M[p][c]))p=r;if(Math.abs(M[p][c])<1e-9)return null;[M[c],M[p]]=[M[p],M[c]];const div=M[c][c];for(let j=c;j<=n;j++)M[c][j]/=div;for(let r=0;r<n;r++){if(r===c)continue;const f=M[r][c];for(let j=c;j<=n;j++)M[r][j]-=f*M[c][j]}}return M.map(r=>r[n])}
async function finishScanning(){if(!pages.length)return closeScanner();closeScanner();currentImage=await stitch(pages);openSheet()}async function handleFileUpload(e){const f=e.target.files[0];if(!f)return;e.target.value='';if(f.type==='application/pdf'){toast('PDF ondersteuning werkt alleen met browser PDF.js op Netlify; upload een foto op GitHub Pages.');return}const url=await readFile(f);pages=[url];openReview(0)}function readFile(f){return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)})}function stitch(arr){return new Promise(res=>{const imgs=[];let n=0;arr.forEach((u,i)=>{const im=new Image();im.onload=()=>{imgs[i]=im;if(++n===arr.length)build()};im.src=u});function build(){const W=Math.max(...imgs.map(i=>i.width)),H=imgs.reduce((s,i)=>s+i.height+20,0),c=process,ctx=c.getContext('2d');c.width=W;c.height=H;ctx.fillStyle='#ddd';ctx.fillRect(0,0,W,H);let y=0;imgs.forEach(im=>{ctx.drawImage(im,(W-im.width)/2,y);y+=im.height+20});res(c.toDataURL('image/jpeg',.92))}})}function openSheet(){preview.src=currentImage;preview.hidden=false;date.valueAsDate=new Date();amount.value='';desc.value='';notes.value='';sheet.classList.add('open')}sheet.onclick=e=>{if(e.target===sheet)sheet.classList.remove('open')};function addExpense(){const a=parseFloat(amount.value),d=desc.value.trim();if(!a||!d)return toast('Vul bedrag en beschrijving in');expenses.unshift({id:Date.now(),date:date.value,amount:a,desc:d,cat:cat.value,notes:notes.value,img:currentImage});sheet.classList.remove('open');currentImage=null;render();toast('Uitgave toegevoegd')}function render(){total.textContent='EUR '+expenses.reduce((s,e)=>s+e.amount,0).toFixed(2);list.innerHTML=expenses.length?expenses.map(e=>`<div class="expense"><div class="row"><div class="thumb">${e.img?`<img src="${e.img}">`:'Doc'}</div><div class="body"><div class="topline"><div class="desc">${esc(e.desc)}</div><div class="amount">EUR ${e.amount.toFixed(2)}</div></div><div class="meta">${fmt(e.date)}
