<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>VisaTracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=3">
  <meta name="theme-color" content="#1A1F71">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">
        <div class="visa-chip"><span>V</span>ISA</div>
        <div>
          <h1>VisaTracker</h1>
          <p>Uitgavenbeheer</p>
        </div>
      </div>
      <button class="header-btn" id="exportButton">PDF</button>
    </header>

    <div id="homeScreen" class="screen active">
      <div class="home-content">
        <button class="scan-hero" id="heroUploadButton">
          <b>📸 Document scannen</b>
          <small>Zoekt automatisch de hoeken, cropt en zet recht</small>
        </button>
        <div class="actions">
          <button class="quick-btn" id="photoUploadButton">📷 Foto uploaden</button>
          <button class="quick-btn" id="openSheetButton">➕ Handmatig toevoegen</button>
        </div>
        <input id="photoInput" type="file" accept="image/*" hidden>
        <div class="summary">
          <strong>Foto's</strong>
          <span class="pill">Totaal: <b id="totalDisplay">0</b></span>
        </div>
        <div id="expenseList" class="empty">Nog geen foto's</div>
      </div>
    </div>

    <div id="reviewScreen" class="screen">
      <div class="review-top">
        <button id="reviewBackButton">← Terug</button>
        <b>Hoeken controleren</b>
        <span></span>
      </div>
      <div id="reviewFrame" class="review-frame">
        <img id="reviewImage" alt="Review">
      </div>
      <div class="tools">
        <button class="tool-btn" data-crop-mode="portrait">📱 Portrait</button>
        <button class="tool-btn" data-crop-mode="square">⬜ Vierkant</button>
        <button class="tool-btn" data-crop-mode="banner">🖼 Banner</button>
        <button class="accept" id="acceptReviewButton">✓ Bevestigen</button>
      </div>
    </div>
  </div>

  <div id="formSheet" class="form-sheet">
    <div class="sheet-content">
      <div class="sheet-handle"></div>
      <h2>Foto gegevens</h2>
      
      <div class="form-group">
        <label>Voorvertoning</label>
        <img id="formPreview" class="form-preview" hidden alt="Preview">
      </div>

      <div class="form-group">
        <label>Of laad via link</label>
        <input id="photoUrl" type="url" placeholder="https://...">
        <button id="previewUrlButton" class="ghost-inline-btn">Preview</button>
      </div>

      <div class="ai-status hidden" id="aiStatus">
        <div class="spinner"></div>
        <span id="aiStatusText"></span>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Datum</label>
          <input id="photoDate" type="date">
        </div>
        <div class="form-group">
          <label>Titel *</label>
          <input id="photoTitle" type="text" placeholder="Bijv. Restaurantrekening">
        </div>
        <div class="form-group">
          <label>Bron</label>
          <input id="photoCredit" type="text" placeholder="Bijv. Restaurant XYZ">
        </div>
        <div class="form-group">
          <label>Categorie</label>
          <select id="photoCategory"></select>
        </div>
        <div class="form-group">
          <label>Eigen categorie</label>
          <input id="customCategory" type="text" placeholder="Bijv. Parkeren">
        </div>
        <div class="form-group">
          <label>Tags</label>
          <input id="photoTags" type="text" placeholder="bijv. travel, restaurant">
        </div>
      </div>

      <div class="form-group">
        <label>Notities</label>
        <textarea id="photoNotes" placeholder="Eventuele opmerkingen..."></textarea>
      </div>

      <div class="form-actions">
        <button class="cancel-btn" id="closeFormSheetBtn">Annuleer</button>
        <button class="save-btn" id="savePhotoButton">✓ Opslaan</button>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2>Foto bewerken</h2>
      
      <div class="form-grid">
        <div class="form-group">
          <label>Datum</label>
          <input id="editDate" type="date">
        </div>
        <div class="form-group">
          <label>Titel</label>
          <input id="editTitle" type="text">
        </div>
        <div class="form-group">
          <label>Bron</label>
          <input id="editCredit" type="text">
        </div>
        <div class="form-group">
          <label>Categorie</label>
          <select id="editCategory"></select>
        </div>
        <div class="form-group">
          <label>Tags</label>
          <input id="editTags" type="text">
        </div>
        <div class="form-group">
          <label>Notities</label>
          <textarea id="editNotes"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button class="cancel-btn" id="cancelEditButton">Annuleer</button>
        <button class="save-btn" id="saveEditButton">✓ Opslaan</button>
      </div>
    </div>
  </div>

  <div id="categoryStrip" class="category-strip"></div>
  <div id="toast" class="toast"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
