<!doctype html>
<html lang="nl">

<title>VisaTracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1F71">
<style>
:root{--blue:#1A1F71;--gold:#F7B600;--bg:#F6F7FB;--ink:#171923;--muted:#697386;--line:#DDE3EE;--bad:#C0392B}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif}.app{min-height:100vh;display:flex;flex-direction:column}.top{background:var(--blue);color:white;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;gap:10px;align-items:center}.logo{background:white;color:var(--blue);font-weight:900;font-style:italic;border-radius:7px;padding:6px 11px}.logo span{color:var(--gold)}h1{font-size:16px;margin:0}.sub{font-size:11px;opacity:.7}.btn,.top button{border:0;border-radius:10px;background:var(--gold);color:var(--blue);font-weight:800;padding:11px 14px}.main{padding:16px;padding-bottom:80px}.scan-big{width:100%;border:0;border-radius:18px;background:var(--blue);color:white;padding:28px 18px;margin-bottom:12px;text-align:center}.scan-big b{font-size:22px;display:block;margin-bottom:6px}.scan-big small{opacity:.72}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.tile{background:white;border:1px solid var(--line);border-radius:12px;padding:16px 8px;font-weight:800}.summary{display:flex;justify-content:space-between;align-items:center;margin:10px 0 12px}.pill{background:var(--blue);color:white;border-radius:999px;padding:7px 12px;font-size:13px}.empty{text-align:center;color:var(--muted);padding:50px 10px}.expense{background:white;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px}.row{display:flex}.thumb{width:82px;min-height:82px;background:#eee;display:grid;place-items:center;overflow:hidden;border-right:1px solid var(--line);font-size:12px;color:var(--muted)}.thumb img{width:82px;height:82px;object-fit:cover}.body{padding:11px;flex:1;min-width:0}.line1{display:flex;justify-content:space-between;gap:8px}.desc{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.amt{font-weight:900;color:var(--blue);white-space:nowrap}.meta,.note{font-size:12px;color:var(--muted);margin-top:5px}.cat{display:inline-block;margin-top:6px;background:#EEF1F8;color:#3F4B66;border-radius:6px;padding:3px 7px;font-size:11px;text-transform:uppercase}.del{width:100%;border:0;border-top:1px solid var(--line);background:white;color:var(--bad);padding:10px;font-weight:800}.scanner,.review,.sheet{position:fixed;inset:0;display:none;z-index:20}.scanner.on,.review.on,.sheet.on{display:flex}.scanner{background:#000;flex-direction:column}.scan-head,.scan-foot{position:absolute;left:0;right:0;z-index:3;display:flex;justify-content:space-between;align-items:center;color:white;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;background:linear-gradient(to bottom,rgba(0,0,0,.78),transparent)}.scan-foot{top:auto;bottom:0;padding:18px 24px calc(env(safe-area-inset-bottom,0px) + 18px);background:linear-gradient(to top,rgba(0,0,0,.84),transparent)}video{width:100%;height:100%;object-fit:cover}.close{border:0;background:rgba(255,255,255,.2);color:white;border-radius:50%;width:38px;height:38px;font-size:22px}.frame{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);width:78%;max-width:350px;aspect-ratio:3/4;border:2px dashed rgba(255,255,255,.75);border-radius:14px}.shutter{width:78px;height:78px;border-radius:50%;border:4px solid white;background:rgba(255,255,255,.15)}.shutter:after{content:"";display:block;width:54px;height:54px;background:white;border-radius:50%;margin:8px}.done{visibility:hidden}.strip{position:absolute;left:0;right:0;bottom:112px;display:flex;gap:8px;overflow:auto;padding:0 16px;z-index:3}.mini{position:relative;flex:0 0 auto}.mini img{width:52px;height:70px;object-fit:cover;border:2px solid white;border-radius:8px}.mini button{position:absolute;right:-7px;top:-7px;border:0;border-radius:50%;background:var(--bad);color:white;width:22px;height:22px}.review{z-index:30;background:#111;flex-direction:column}.review-top{background:var(--blue);color:white;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;display:flex;justify-content:space-between;align-items:center}.review-top button{background:transparent;color:var(--gold);border:0;font-weight:900}.stage{flex:1;display:grid;place-items:center;position:relative;overflow:hidden;padding:12px}#canvas{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 8px 32px #000}#overlay{position:absolute;overflow:visible;touch-action:none}.handle{filter:drop-shadow(0 2px 4px #000)}.tools{display:flex;gap:8px;background:var(--blue);padding:12px 12px calc(env(safe-area-inset-bottom,0px) + 12px)}.tools button{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.12);color:white;border-radius:10px;padding:12px 10px;font-weight:900}.tools .accept{background:var(--gold);color:var(--blue);border:0;flex:2}.sheet{z-index:40;background:rgba(0,0,0,.55);align-items:flex-end}.panel{background:var(--bg);width:100%;max-height:92vh;overflow:auto;border-radius:20px 20px 0 0;padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 18px)}.bar{width:42px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px}.preview{width:100%;max-height:210px;object-fit:contain;background:#111;border-radius:10px;margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{margin-bottom:13px}label{display:block;font-size:11px;text-transform:uppercase;font-weight:900;color:var(--muted);margin-bottom:6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;background:white;font:inherit}textarea{min-height:68px}.save{width:100%;background:var(--blue);color:white;border:0;border-radius:12px;padding:15px;font-weight:900}.toast{position:fixed;left:16px;right:16px;bottom:calc(env(safe-area-inset-bottom,0px) + 22px);z-index:99;background:#15161a;color:white;text-align:center;border-radius:12px;padding:13px;opacity:0;transform:translateY(70px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}@media(min-width:720px){body{display:grid;place-items:center;padding:24px}.app{width:440px;max-height:900px;border-radius:22px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.14)}.scanner,.review{max-width:440px;margin:auto;left:50%;transform:translateX(-50%)}.panel{max-width:440px;margin:auto}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand"><div class="logo"><span>V</span>ISA</div><div><h1>VisaTracker</h1><div class="sub">Uitgavenbeheer</div></div></div><button onclick="exportPdf()">PDF</button></header>
<main class="main"><button class="scan-big" onclick="openCam()"><b>Document scannen</b><small>Automatisch randen zoeken, rechtzetten en bevestigen</small></button><div class="actions"><button class="tile" onclick="photoInput.click()">Foto uploaden</button><button class="tile" onclick="showToast('PDF upload is beperkt op GitHub Pages. Gebruik best foto of camera.')">PDF uploaden</button></div><input id="photoInput" type="file" accept="image/*" hidden><div class="summary"><strong>Uitgaven</strong><span class="pill">Totaal: <b id="total">EUR 0.00</b></span></div><div id="list" class="empty">Nog geen uitgaven</div></main>
</div>
<section id="scanner" class="scanner"><div class="scan-head"><b>Document scannen</b><button class="close" onclick="closeCam()">x</button></div><video id="video" autoplay muted playsinline></video><div class="frame"></div><div id="strip" class="strip"></div><div class="scan-foot"><span><b id="count">0</b> foto&apos;s</span><button class="shutter" onclick="shoot()"></button><button id="done" class="btn done" onclick="finishScan()">Klaar</button></div></section>
<section id="review" class="review"><div class="review-top"><button onclick="backCam()">Terug</button><b>Randen controleren</b><span></span></div><div id="stage" class="stage"><canvas id="canvas"></canvas><svg id="overlay"><polygon id="poly" fill="rgba(247,182,0,.16)" stroke="#F7B600" stroke-width="2"></polygon><circle id="h0" class="handle" r="16" fill="white" stroke="#1A1F71" stroke-width="2.5"></circle><circle id="h1" class="handle" r="16" fill="white" stroke="#1A1F71" stroke-width="2.5"></circle><circle id="h2" class="handle" r="16" fill="white" stroke="#1A1F71" stroke-width="2.5"></circle><circle id="h3" class="handle" r="16" fill="white" stroke="#1A1F71" stroke-width="2.5"></circle></svg></div><div class="tools"><button onclick="rotate()">Draai</button><button onclick="filter='bw';draw();detect();">Z/W</button><button onclick="filter='sharp';draw();detect();">Scherp</button><button class="accept" onclick="acceptCrop()">Bevestigen</button></div></section>
<section id="sheet" class="sheet"><div class="panel"><div class="bar"></div><h2>Nieuwe uitgave</h2><img id="preview" class="preview"><div class="grid"><div class="field"><label>Datum</label><input id="date" type="date"></div><div class="field"><label>Bedrag</label><input id="amount" type="number" step="0.01" placeholder="0.00"></div></div><div class="field"><label>Beschrijving</label><input id="desc" placeholder="bv. Parking luchthaven"></div><div class="field"><label>Categorie</label><select id="cat"></select></div><div class="field"><label>Notities</label><textarea id="notes"></textarea></div><button class="save" onclick="saveExpense()">Toevoegen</button></div></section>
<div id="toast" class="toast"></div><canvas id="work" hidden></canvas><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const categories=['Parking','Brandstof','Tol','Openbaar vervoer','Taxi','Huurwagen','Boodschappen','Restaurant','Koffie','Hotel','Reizen','Vlucht/Trein','Kantoor','Software','Diensten','Abonnementen','Telecom','Verzekering','Belastingen','Gezondheid','Onderhoud','Cadeaus','Vrije tijd','Aankopen','Overige'];
let expenses=JSON.parse(localStorage.visaExpenses||'[]'),pages=[],stream=null,current='',img=null,idx=0,rot=0,filter='none',quad=[],drag=-1;
cat.innerHTML=categories.map(c=>`<option>${c}</option>`).join('');date.valueAsDate=new Date();render();
function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>toast.classList.remove('show'),2400)}
async function openCam(){pages=[];thumbs();scanner.classList.add('on');try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});video.srcObject=stream}catch(e){scanner.classList.remove('on');showToast('Camera niet beschikbaar')}}
function closeCam(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}scanner.classList.remove('on')}function backCam(){review.classList.remove('on');scanner.classList.add('on')}function shoot(){const c=work;c.width=video.videoWidth||1280;c.height=video.videoHeight||720;c.getContext('2d').drawImage(video,0,0,c.width,c.height);pages.push(c.toDataURL('image/jpeg',.92));thumbs();openReview(pages.length-1)}function thumbs(){count.textContent=pages.length;done.style.visibility=pages.length?'visible':'hidden';strip.innerHTML=pages.map((p,i)=>`<div class="mini"><img src="${p}" onclick="openReview(${i})"><button onclick="event.stopPropagation();pages.splice(${i},1);thumbs()">x</button></div>`).join('')}function finishScan(){if(!pages.length)return closeCam();closeCam();stitch(pages).then(u=>{current=u;openForm()})}
photoInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{pages=[r.result];openReview(0)};r.readAsDataURL(f);e.target.value=''};
function openReview(i){idx=i;rot=0;filter='none';img=new Image();img.onload=()=>{scanner.classList.remove('on');review.classList.add('on');draw();detect();dragHandles();showToast('Randen gevonden. Versleep bolletjes indien nodig.')};img.src=pages[i]}
function draw(){let w=img.width,h=img.height;if(rot%180)[w,h]=[h,w];canvas.width=w;canvas.height=h;const x=canvas.getContext('2d');x.save();x.translate(w/2,h/2);x.rotate(rot*Math.PI/180);x.drawImage(img,-img.width/2,-img.height/2);x.restore();if(filter!=='none'){const d=x.getImageData(0,0,w,h),p=d.data;for(let i=0;i<p.length;i+=4){if(filter==='bw'){const g=.299*p[i]+.587*p[i+1]+.114*p[i+2];p[i]=p[i+1]=p[i+2]=g}else{p[i]=Math.min(255,1.45*(p[i]-128)+145);p[i+1]=Math.min(255,1.45*(p[i+1]-128)+145);p[i+2]=Math.min(255,1.45*(p[i+2]-128)+145)}}x.putImageData(d,0,0)}}
function rotate(){rot=(rot+90)%360;draw();detect()}function detect(){const W=canvas.width,H=canvas.height,d=canvas.getContext('2d').getImageData(0,0,W,H).data;quad=edgeDoc(W,H,d)||brightDoc(W,H,d)||[{x:W*.06,y:H*.06},{x:W*.94,y:H*.06},{x:W*.94,y:H*.94},{x:W*.06,y:H*.94}];paint()}function edgeDoc(W,H,d){const s=Math.min(1,700/Math.max(W,H)),w=Math.round(W*s),h=Math.round(H*s),g=new Uint8ClampedArray(w*h),pts=[];for(let y=0;y<h;y++)for(let x=0;x<w;x++){const sx=Math.min(W-1,Math.round(x/s)),sy=Math.min(H-1,Math.round(y/s)),i=(sy*W+sx)*4;g[y*w+x]=.299*d[i]+.587*d[i+1]+.114*d[i+2]}let vals=[];for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const p=y*w+x,m=Math.abs(g[p+1]-g[p-1])+Math.abs(g[p+w]-g[p-w]);vals.push(m)}vals.sort((a,b)=>a-b);const th=Math.max(42,vals[Math.floor(vals.length*.88)]||0);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const p=y*w+x,m=Math.abs(g[p+1]-g[p-1])+Math.abs(g[p+w]-g[p-w]);if(m>th)pts.push([x/s,y/s])}return corners(W,H,pts)}function brightDoc(W,H,d){const step=Math.max(2,Math.floor(Math.min(W,H)/450)),pts=[];for(let y=0;y<H;y+=step)for(let x=0;x<W;x+=step){const i=(y*W+x)*4,l=.299*d[i]+.587*d[i+1]+.114*d[i+2],sat=Math.max(d[i],d[i+1],d[i+2])-Math.min(d[i],d[i+1],d[i+2]);if(l>170&&(sat<90||l>220))pts.push([x,y])}return corners(W,H,pts)}function corners(W,H,pts){if(pts.length<60)return null;let minX=W,minY=H,maxX=0,maxY=0;pts.forEach(p=>{minX=Math.min(minX,p[0]);minY=Math.min(minY,p[1]);maxX=Math.max(maxX,p[0]);maxY=Math.max(maxY,p[1])});const area=(maxX-minX)*(maxY-minY);if(area<W*H*.12)return null;const pad=Math.min(W,H)*.015;return[{x:Math.max(0,minX-pad),y:Math.max(0,minY-pad)},{x:Math.min(W,maxX+pad),y:Math.max(0,minY-pad)},{x:Math.min(W,maxX+pad),y:Math.min(H,maxY+pad)},{x:Math.max(0,minX-pad),y:Math.min(H,maxY+pad)}]}
function paint(){const r=canvas.getBoundingClientRect(),sr=stage.getBoundingClientRect();overlay.style.left=r.left-sr.left+'px';overlay.style.top=r.top-sr.top+'px';overlay.style.width=r.width+'px';overlay.style.height=r.height+'px';overlay.setAttribute('viewBox',`0 0 ${r.width} ${r.height}`);const p=quad.map(q=>[q.x*r.width/canvas.width,q.y*r.height/canvas.height]);poly.setAttribute('points',p.map(a=>a.join(',')).join(' '));p.forEach((a,i)=>{const h=document.getElementById('h'+i);h.setAttribute('cx',a[0]);h.setAttribute('cy',a[1]);h.style.pointerEvents='all'})}
function dragHandles(){overlay.style.pointerEvents='all';for(let i=0;i<4;i++)document.getElementById('h'+i).onpointerdown=e=>{drag=i;e.preventDefault();overlay.setPointerCapture(e.pointerId)};overlay.onpointermove=e=>{if(drag<0)return;const r=canvas.getBoundingClientRect();quad[drag]={x:Math.max(0,Math.min(canvas.width,(e.clientX-r.left)*canvas.width/r.width)),y:Math.max(0,Math.min(canvas.height,(e.clientY-r.top)*canvas.height/r.height))};paint()};overlay.onpointerup=()=>drag=-1;overlay.onpointercancel=()=>drag=-1}
function acceptCrop(){pages[idx]=warp(canvas,quad);thumbs();review.classList.remove('on');scanner.classList.add('on')}function warp(src,q){const W=Math.round(Math.max(dist(q[0],q[1]),dist(q[2],q[3]))),H=Math.round(Math.max(dist(q[1],q[2]),dist(q[3],q[0]))),scale=Math.min(1,1600/Math.max(W,H)),w=Math.max(1,Math.round(W*scale)),h=Math.max(1,Math.round(H*scale)),out=document.createElement('canvas');out.width=w;out.height=h;const ctx=out.getContext('2d'),tmp=document.createElement('canvas'),t=tmp.getContext('2d');tmp.width=src.width;tmp.height=src.height;t.drawImage(src,0,0);const sd=t.getImageData(0,0,src.width,src.height),od=ctx.createImageData(w,h),m=mat([{x:0,y:0},{x:w-1,y:0},{x:w-1,y:h-1},{x:0,y:h-1}],q);for(let y=0;y<h;y++)for(let x=0;x<w;x++){const z=m[6]*x+m[7]*y+1,sx=(m[0]*x+m[1]*y+m[2])/z,sy=(m[3]*x+m[4]*y+m[5])/z,c=samp(sd,sx,sy),i=(y*w+x)*4;od.data[i]=c[0];od.data[i+1]=c[1];od.data[i+2]=c[2];od.data[i+3]=255}ctx.putImageData(od,0,0);return out.toDataURL('image/jpeg',.92)}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function samp(im,x,y){x=Math.max(0,Math.min(im.width-1,x|0));y=Math.max(0,Math.min(im.height-1,y|0));const i=(y*im.width+x)*4;return[im.data[i],im.data[i+1],im.data[i+2]]}function mat(a,b){const A=[],B=[];for(let i=0;i<4;i++){const x=a[i].x,y=a[i].y,u=b[i].x,v=b[i].y;A.push([x,y,1,0,0,0,-u*x,-u*y]);B.push(u);A.push([0,0,0,x,y,1,-v*x,-v*y]);B.push(v)}return solve(A,B)||[1,0,0,0,1,0,0,0]}function solve(A,b){const n=b.length,M=A.map((r,i)=>r.concat(b[i]));for(let c=0;c<n;c++){let p=c;for(let r=c+1;r<n;r++)if(Math.abs(M[r][c])>Math.abs(M[p][c]))p=r;if(Math.abs(M[p][c])<1e-9)return null;[M[c],M[p]]=[M[p],M[c]];let v=M[c][c];for(let j=c;j<=n;j++)M[c][j]/=v;for(let r=0;r<n;r++){if(r===c)continue;let f=M[r][c];for(let j=c;j<=n;j++)M[r][j]-=f*M[c][j]}}return M.map(r=>r[n])}
function stitch(arr){return new Promise(res=>{let imgs=[],loaded=0;arr.forEach((u,i)=>{const im=new Image();im.onload=()=>{imgs[i]=im;if(++loaded===arr.length){const W=Math.max(...imgs.map(x=>x.width)),H=imgs.reduce((s,x)=>s+x.height+18,0),c=work,x=c.getContext('2d');c.width=W;c.height=H;x.fillStyle='#eee';x.fillRect(0,0,W,H);let y=0;imgs.forEach(im=>{x.drawImage(im,(W-im.width)/2,y);y+=im.height+18});res(c.toDataURL('image/jpeg',.9))}};im.src=u})})}
function openForm(){preview.src=current;date.valueAsDate=new Date();amount.value='';desc.value='';notes.value='';sheet.classList.add('on')}sheet.onclick=e=>{if(e.target===sheet)sheet.classList.remove('on')};function saveExpense(){const a=parseFloat(amount.value),d=desc.value.trim();if(!a||!d)return showToast('Vul bedrag en beschrijving in');expenses.unshift({id:Date.now(),date:date.value,amount:a,desc:d,cat:cat.value,notes:notes.value,img:current});localStorage.visaExpenses=JSON.stringify(expenses);sheet.classList.remove('on');render();showToast('Uitgave toegevoegd')}
function render(){total.textContent='EUR '+expenses.reduce((s,e)=>s+Number(e.amount),0).toFixed(2);list.innerHTML=expenses.length?expenses.map(e=>`<article class="expense"><div class="row"><div class="thumb">${e.img?`<img src="${e.img}">`:'Doc'}</div><div class="body"><div class="line1"><div class="desc">${esc(e.desc)}</div><div class="amt">EUR ${Number(e.amount).toFixed(2)}</div></div><div class="meta">${fmt(e.date)}</div><span class="cat">${esc(e.cat)}</span>${e.notes?`<div class="note">${esc(e.notes)}</div>`:''}</div></div><button class="del" onclick="expenses=expenses.filter(x=>x.id!==${e.id});localStorage.visaExpenses=JSON.stringify(expenses);render()">Verwijderen</button></article>`).join(''):'<div class="empty">Nog geen uitgaven</div>'}function fmt(d){if(!d)return'';const p=d.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function exportPdf(){if(!expenses.length)return showToast('Geen uitgaven');const{jsPDF}=window.jspdf,doc=new jsPDF();expenses.forEach((e,i)=>{if(i)doc.addPage();doc.text(e.desc,10,15);doc.text('EUR '+Number(e.amount).toFixed(2),10,25);doc.text(e.cat,10,35);if(e.img)doc.addImage(e.img,'JPEG',10,45,180,120)});doc.save('visatracker.pdf')}if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
