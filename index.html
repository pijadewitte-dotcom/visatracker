<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>VisaTracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=11">
  <meta name="theme-color" content="#1A1F71">
</head>
<body>
  <div class="app">
    <header class="top"><div class="brand"><div class="logo"><span>V</span>ISA</div><div><h1>VisaTracker</h1><div class="sub">Uitgavenbeheer</div></div></div><button class="btn" id="exportBtn">PDF</button></header>
    <main class="main"><button class="scan-big" id="scanBtn"><b>Document scannen</b><small>Zoekt automatisch de hoeken, cropt en zet recht</small></button><div class="actions"><button class="tile" id="photoBtn">Foto uploaden</button><button class="tile" id="pdfBtn">PDF uploaden</button></div><input id="photoInput" type="file" accept="image/*" hidden><div class="summary"><strong>Uitgaven</strong><span class="pill">Totaal: <b id="total">EUR 0.00</b></span></div><div id="list" class="empty">Nog geen uitgaven</div></main>
  </div>
  <section id="scanner" class="scanner"><div class="scan-head"><b>Document scannen</b><button class="close" id="closeCamBtn">x</button></div><video id="video" autoplay muted playsinline></video><svg id="scannerOverlay" class="scanner-overlay"><polygon id="scannerPoly" class="scanner-outline"></polygon><circle id="scannerH0" class="scanner-corner" r="6"></circle><circle id="scannerH1" class="scanner-corner" r="6"></circle><circle id="scannerH2" class="scanner-corner" r="6"></circle><circle id="scannerH3" class="scanner-corner" r="6"></circle></svg><div class="frame"></div><div id="strip" class="strip"></div><div class="scan-foot"><span><b id="count">0</b> foto's</span><button class="shutter" id="shootBtn"></button><button id="doneBtn" class="btn done">Klaar</button></div></section>
  <section id="review" class="review"><div class="review-top"><button id="reviewBackBtn">Terug</button><b>Hoeken controleren</b><span></span></div><div id="stage" class="stage"><canvas id="canvas"></canvas><svg id="overlay"><polygon id="poly" fill="rgba(247,182,0,.16)" stroke="#F7B600" stroke-width="2"></polygon><circle id="h0" class="handle" r="17"></circle><circle id="h1" class="handle" r="17"></circle><circle id="h2" class="handle" r="17"></circle><circle id="h3" class="handle" r="17"></circle></svg></div><div class="tools"><button id="rotateBtn">Draai</button><button id="redetectBtn">Zoek opnieuw</button><button id="enhanceBtn">Scherp</button><button class="accept" id="acceptBtn">Bevestigen</button></div></section>
  <section id="sheet" class="sheet"><div class="panel"><div class="bar"></div><h2>Nieuwe uitgave</h2><img id="preview" class="preview"><div class="grid"><div class="field"><label>Datum</label><input id="date" type="date"></div><div class="field"><label>Bedrag</label><input id="amount" type="number" step="0.01" placeholder="0.00"></div></div><div class="field"><label>Beschrijving</label><input id="desc" placeholder="bv. Parking luchthaven"></div><div class="field"><label>Categorie</label><select id="cat"></select></div><div class="field"><label>Notities</label><textarea id="notes"></textarea></div><button class="save" id="saveBtn">Toevoegen</button></div></section>
  <div id="toast" class="toast"></div><canvas id="work" hidden></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js?v=6"></script>
  <script src="pdf-export.js?v=5"></script>
</body>
</html>
